<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDSTool</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="msgArea"></div>
    <div class="fixed-bottom-bar">
      <input type="text" id="msgInput" required placeholder="..." />
      <button id="sendMsgBtn">Send</button>
    </div>
      <div class="fileInputContainer">
        <div>
          <label for="fileInput0" class="custom-file-label">📤Fichier</label>
        <input type="file" name="file0" id="fileInput0" />
      </div>
      <div>
        <label for="fileInput" class="custom-file-label">🏞️Image</label>
        <input type="file" name="file" id="fileInput" accept="image/*" />
      </div>
      </div>
    <div>
    <progress aria-valuemin="0" value="0" id="progress-bar" aria-valuemax="1" aria-valuenow="0.5"></progress>
  </div>
    <script src="js/index.js"></script>
  </body>
</html>
